name: Build and Push to GHCR

# This workflow runs on any new tag push (e.g., v1.0, v2.1.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

deploy:
  needs: build-and-push 
  runs-on: ubuntu-latest
  permissions:
    id-token: write
    contents: read

  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ant-demo-cluster --region ap-southeast-1

    - name: Deploy new image to EKS
      run: |
        kubectl set image deployment/ant-demo-deployment webapp=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        kubectl rollout status deployment/ant-demo-deployment