{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ant-demo.fullname" . }}
  labels:
    {{- include "ant-demo.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ant-demo.fullname" . }}
  labels:
    {{- include "ant-demo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ant-demo.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ant-demo.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}