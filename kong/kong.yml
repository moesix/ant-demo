_format_version: "3.0"
_transform: true

services:
  # Webapp Service
  - name: webapp-service
    url: http://webapp:5000
    tags: ["webapp", "ui"]

  # User Service (HTTP)
  - name: user-service
    url: http://user-service:5000
    tags: ["user-service"]

  # Logging Service (HTTP)
  - name: logging-service
    url: http://logging-service:5000
    tags: ["logging-service"]

routes:
  # Webapp Route
  - name: webapp-route
    paths: ["/api/webapp"]
    service: webapp-service
    strip_path: true
    tags: ["webapp"]
    protocols: ["http", "https"]

  # WebSocket Route
  - name: websocket-route
    paths: ["/socket.io"]
    service: webapp-service
    strip_path: false
    tags: ["websocket"]
    protocols: ["http", "https"]

  # User Service Routes (HTTP)
  - name: user-service-http-route
    paths: ["/api/users"]
    service: user-service
    strip_path: true
    tags: ["user-service"]

  # Logging Service Routes (HTTP)
  - name: logging-service-http-route
    paths: ["/api/logs"]
    service: logging-service
    strip_path: true
    tags: ["logging-service"]

plugins:
  # Rate Limiting Plugin
  - name: rate-limiting
    tags: ["rate-limiting"]
    enabled: true
    config:
      minute: 10
      policy: local

  # CORS Plugin
  - name: cors
    tags: ["cors"]
    enabled: true
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["Content-Type", "Authorization"]
      exposed_headers: ["X-Kong-Upstream-Latency"]
      credentials: true