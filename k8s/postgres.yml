apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: ant-demo
  labels:
    app: postgres-db
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: postgres-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: ant-demo
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "antdemo"
        - name: POSTGRES_USER
          value: "antdemo"
        - name: POSTGRES_PASSWORD
          value: "strongpassword"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
        - mountPath: /docker-entrypoint-initdb.d
          name: init-scripts
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - antdemo
            - -d
            - antdemo
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - antdemo
            - -d
            - antdemo
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - antdemo
            - -d
            - antdemo
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: postgres-data
        emptyDir: {}
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: ant-demo
data:
  init-db.sh: |
    #!/bin/bash
    echo "Creating initial database..."
    psql -U antdemo -d antdemo << EOF
    CREATE TABLE IF NOT EXISTS logs (
        id SERIAL PRIMARY KEY,
        timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        message TEXT,
        level VARCHAR(20),
        service VARCHAR(50)
    );
    INSERT INTO logs (message, level, service) VALUES ('Initial log entry', 'INFO', 'system');
    EOF