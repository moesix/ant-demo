apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: user-service-virtualservice
  namespace: ant-demo
  labels:
    app.kubernetes.io/name: user-service-virtualservice
    app.kubernetes.io/part-of: ant-demo
spec:
  hosts:
  - "*"
  gateways:
  - ant-demo-gateway
  http:
  - match:
    - uri:
        prefix: /api/users/
    route:
    - destination:
        host: ant-demo-user-service
        port:
          number: 5000
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "5xx,connect-failure"
    fault:
      delay:
        fixedDelay: 500ms
        percentage:
          value: 10
