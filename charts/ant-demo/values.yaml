# Default values for ant-demo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/moesix/ant-demo
  pullPolicy: IfNotPresent
  tag: "v4"

userService:
  image:
    repository: ghcr.io/moesix/ant-demo-user-service
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 2

loggingService:
  image:
    repository: ghcr.io/moesix/ant-demo-logging-service
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 2

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

userService:
  service:
    type: ClusterIP
    httpPort: 5000
    grpcPort: 50051

loggingService:
  service:
    type: ClusterIP
    httpPort: 5000
    grpcPort: 50052

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt

  hosts:
    - host: ant-demo.local
      paths:
        - path: /
          pathType: Prefix

  tls: []
  #  - secretName: ant-demo-tls
  #    hosts:
  #      - ant-demo.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

userService:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

loggingService:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 60

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ant-demo

config: {}

secrets: {}

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClassName: ""

env:
  APP_VERSION: "4"
  DB_HOST: "ant-demo-postgresql"
  DB_NAME: "antdemo"
  DB_USER: "antuser"
  USER_SERVICE_HOST: "ant-demo-user-service"
  USER_SERVICE_PORT: "50051"
  LOGGING_SERVICE_HOST: "ant-demo-logging-service"
  LOGGING_SERVICE_PORT: "50052"

postgresql:
  enabled: true
  auth:
    username: antuser
    password: antpassword
    database: antdemo
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      size: 1Gi
    health:
      enabled: true
      livenessProbe:
        initialDelay: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        initialDelay: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 2
  # Backup configuration
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retain: 7
  # Connection pooling
  pooler:
    enabled: false